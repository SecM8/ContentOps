id: defender-encoded-powershell-001
version: "1.0.0"
platform: defender
status: production

defender:
  displayName: "Suspicious Encoded PowerShell Command"
  isEnabled: true
  queryCondition:
    queryText: |
      DeviceProcessEvents
      | where Timestamp > ago(1h)
      | where FileName in~ ("powershell.exe", "pwsh.exe")
      | where ProcessCommandLine has_any (
          "-encodedcommand", "-enc ", "-e ",
          "FromBase64String", "[Convert]::FromBase64"
        )
      | where ProcessCommandLine !has "Microsoft Monitoring Agent"
      | where ProcessCommandLine !has "Windows Defender"
      | project
          Timestamp, DeviceId, DeviceName, AccountName, AccountDomain,
          ProcessCommandLine, InitiatingProcessFileName,
          InitiatingProcessCommandLine, SHA1
  schedule:
    period: "1H"
  detectionAction:
    alertTemplate:
      title: "Suspicious Encoded PowerShell Command Detected"
      description: "PowerShell executed with encoded command line argument, frequently used to obfuscate malicious scripts."
      severity: medium
      category: Execution
      recommendedActions: |
        1. Decode the base64-encoded command
        2. Review the parent process for context
        3. Check if the user typically runs PowerShell scripts
        4. If malicious, isolate the device and investigate lateral movement
      mitreTechniques:
        - T1059.001
        - T1027
        - T1140
      impactedAssets:
        - "@odata.type": "#microsoft.graph.security.impactedDeviceAsset"
          identifier: deviceId
        - "@odata.type": "#microsoft.graph.security.impactedUserAsset"
          identifier: accountName
    organizationalScope: null
    responseActions:
      - "@odata.type": "#microsoft.graph.security.collectInvestigationPackageResponseAction"
        identifier: deviceId
