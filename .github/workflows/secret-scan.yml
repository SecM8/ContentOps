name: Secret scan

# Runs gitleaks on every push and PR, plus a nightly full-history scan
# so a leak introduced via force-push or rebase still surfaces within
# 24 hours. Configuration lives at `.gitleaks.toml`.
#
# Motivated by the 2026-05 production-tenant-GUID leak documented in
# SECURITY.md. After the history scrub completes, the `commits` block
# in `.gitleaks.toml` can be deleted so historical commits no longer
# get a free pass.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * *"  # 04:17 UTC nightly
  workflow_dispatch:

permissions:
  contents: read
  # gitleaks-action needs:
  # - pull-requests: write — to (1) list the PR's commits via REST
  #   and (2) post the per-finding PR comment.
  # - read on the same scope is insufficient for the comment.
  pull-requests: write

concurrency:
  # Include the event name in the group so a push-to-main run and the
  # nightly full-history scheduled scan land in separate lanes — a push
  # can no longer cancel the in-flight nightly scan (they shared a ref
  # and therefore a group before).
  group: secret-scan-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history for scheduled scans)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Schedule/manual runs scan the whole history; push + PR
          # scans only need the new commits.
          #
          # IMPORTANT: parentheses are required. Without them, GH
          # Actions operator precedence (`&&` binds tighter than `||`)
          # parses `schedule || dispatch && '0' || '50'` as
          # `schedule || (dispatch && '0') || '50'`. When event ==
          # schedule, the first operand is the boolean `true`, so the
          # whole expression short-circuits to `true` and checkout
          # coerces it to fetch-depth=1 — defeating the entire point
          # of the nightly full-history scan.
          fetch-depth: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '0' || '50' }}

      - name: Run gitleaks
        # Pinned by commit SHA per the supply-chain hardening policy
        # in SECURITY.md (action versions are bumped by Renovate).
        #
        # GITLEAKS_ENABLE_UPLOAD_ARTIFACT is disabled: the action
        # otherwise tries to upload `results.sarif` even when no
        # leaks were found (zero-result run produces no file), which
        # fails the step with "File results.sarif does not exist".
        # Findings, when they occur, are still surfaced in the run
        # log and in the GitHub Actions annotations.
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          # No paid licence required for public repos. If this repo
          # is ever made private, set GITLEAKS_LICENSE in secrets and
          # uncomment the next line.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
