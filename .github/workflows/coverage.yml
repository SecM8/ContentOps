name: MITRE ATT&CK coverage

on:
  pull_request:
    paths:
      - "detections/**"
      - "contentops/**"
  push:
    branches: [main]
    paths:
      - "detections/**"
      - "contentops/**"
  workflow_dispatch:

permissions:
  contents: write           # push-to-main branch commits the regenerated badge + layer
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: reporting
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install -e .

      - name: Render markdown coverage
        run: python -m contentops coverage --format markdown --out-md coverage.md

      - name: Render json coverage
        run: python -m contentops coverage --format json --out-json coverage.json

      - name: Render Navigator layer JSON + shields.io badge
        # --no-firings keeps the layer derived from repo + deployed axes
        # only (no LA Query token needed in this job). The badge is
        # always repo-axis only (deterministic, doesn't need creds).
        run: |
          mkdir -p coverage
          python -m contentops navigator \
            --no-deployed --no-firings \
            --out coverage/navigator-layer.json \
            --name "ContentOps MITRE coverage" \
            --description "Repo-axis MITRE ATT&CK coverage regenerated by .github/workflows/coverage.yml"
          python -m contentops coverage \
            --format markdown --out-md /tmp/_coverage.md \
            --out-badge coverage/badge.json

      - name: Post sticky PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0  # v3.0.4
        with:
          header: mitre-attack-coverage
          path: coverage.md

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: MITRE ATT&CK coverage
          path: |
            coverage.json
            coverage/navigator-layer.json
            coverage/badge.json
          if-no-files-found: error

      - name: Commit refreshed badge + layer (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage/navigator-layer.json coverage/badge.json
          if git diff --staged --quiet; then
            echo "no coverage drift to commit"
            exit 0
          fi
          git commit \
            -m "chore(coverage): refresh MITRE Navigator layer + badge" \
            -s
          git push origin HEAD:main
