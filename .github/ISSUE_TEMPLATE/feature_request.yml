name: Feature request
description: Propose a new feature or significant enhancement
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. Before opening a new request:

        1. Check `docs/reference/roadmap.md` — your idea may already be
           tracked there with a design sketch.
        2. Check `docs/reference/gap-assessment.md` — your idea may map
           to a known gap and have effort/severity estimates.
        3. Search existing issues for similar proposals.

        Large feature proposals (new handlers, schema changes) are
        better as a Discussion than an Issue; we can promote to an
        Issue once direction is clear.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-facing pain. "I want X" is less useful than "today I cannot do Y because Z."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should ContentOps do differently? CLI surface, schema field, workflow behaviour, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      multiple: true
      options:
        - "CLI / authoring"
        - "Sentinel handler"
        - "Defender XDR handler"
        - "Lint / validation"
        - "Drift / collect"
        - "Audit / state"
        - "CI / GitHub Actions"
        - "Multi-workspace"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
